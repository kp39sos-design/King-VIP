<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسرع من نتكم 🔥 | نيون فريد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== إعادة ضبط وقواعد أساسية فريدة ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a12; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(#00d4ff, #ff007f); border-radius: 10px; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a12;
            color: #eef5ff;
            padding: 1rem;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== خلفية كروية متحركة (جرافيكس فريد) ===== */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            z-index: 0;
            animation: orbFloat 8s infinite alternate ease-in-out;
        }
        body::before {
            width: 400px;
            height: 400px;
            background: #4d00ff;
            top: -100px;
            left: -100px;
        }
        body::after {
            width: 500px;
            height: 500px;
            background: #ff007f;
            bottom: -150px;
            right: -150px;
            animation-delay: 2s;
        }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.3); }
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ===== شاشة الترحيب ===== */
        #splashScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 40%, #1a0b2e, #0a0a12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
            text-align: center;
            padding: 1.5rem;
            border: 2px solid rgba(0, 212, 255, 0.2);
        }
        #splashScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #splashScreen h1 {
            font-size: 3.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #ff007f, #00ff87);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
        }
        #splashScreen p {
            font-size: 2rem;
            color: #b8b0d0;
            margin: 0.5rem 0 1.5rem;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
        }
        #splashScreen .splash-icon {
            font-size: 5rem;
            background: linear-gradient(135deg, #00d4ff, #ff007f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
        }
        #splashScreen .timer {
            font-size: 1.3rem;
            color: #00ff87;
            background: rgba(0, 255, 135, 0.1);
            padding: 0.4rem 1.8rem;
            border-radius: 60px;
            border: 1px solid #00ff87;
            box-shadow: 0 0 25px rgba(0, 255, 135, 0.2);
        }
        #skipSplash {
            margin-top: 1.8rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #a0b0d0;
            padding: 0.6rem 2.2rem;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            transition: 0.4s;
            letter-spacing: 1px;
        }
        #skipSplash:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #fff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        /* ===== أزرار التبديل (لون أيقوني جديد) ===== */
        .section-switch { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 2rem 0; }
        .switch-btn {
            background: rgba(10, 10, 18, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 800;
            color: #8a8aa0;
            cursor: pointer;
            transition: 0.4s;
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .switch-btn i { margin-left: 8px; }
        .switch-btn.active {
            background: linear-gradient(135deg, #00d4ff, #ff007f);
            color: #0a0a12;
            border-color: #fff;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
            transform: scale(1.05);
        }

        /* ===== تبويبات ===== */
        .tab-container { display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; margin-bottom: 2rem; }
        .tab-btn {
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            padding: 0.5rem 1.6rem;
            border-radius: 60px;
            font-weight: 700;
            color: #8a8aa0;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #00ff87, #00d4ff);
            color: #0a0a12;
            border-color: #fff;
            box-shadow: 0 0 30px rgba(0, 255, 135, 0.3);
        }

        /* ===== شبكة البطاقات بتأثير زجاجي نيوني ===== */
        .prices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
            margin: 1.5rem 0;
        }
        .price-card {
            background: rgba(10, 10, 18, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            border: 1px solid rgba(0, 212, 255, 0.15);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .price-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 212, 255, 0.03), transparent, rgba(255, 0, 127, 0.03), transparent);
            animation: rotateBorder 8s linear infinite;
            z-index: -1;
        }
        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .price-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #ff007f;
            box-shadow: 0 0 50px rgba(255, 0, 127, 0.2), 0 0 80px rgba(0, 212, 255, 0.1);
        }
        .price-card.vip-card {
            border-color: #ff007f;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.15);
        }
        .price-card.vip-card::before {
            background: conic-gradient(from 90deg, transparent, rgba(255, 0, 127, 0.05), transparent, rgba(0, 255, 135, 0.05), transparent);
        }

        .game-badge {
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            letter-spacing: 0.5px;
        }
        .vip-badge {
            background: linear-gradient(135deg, #ff007f, #00ff87);
            color: #0a0a12;
            border: none;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
        }
        .item-name { font-size: 1.3rem; font-weight: 800; margin: 0.7rem 0; color: #fff; }
        .price-eg {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #ff007f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.5rem 0;
        }
        .btn-order {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00d4ff;
            width: 100%;
            padding: 0.7rem;
            border-radius: 3rem;
            font-weight: 700;
            color: #eef5ff;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        .btn-order:hover {
            background: linear-gradient(135deg, #00d4ff, #ff007f);
            color: #0a0a12;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
            border-color: #fff;
        }

        /* ===== قسم الشحن التفاعلي (ميزات خاصة) ===== */
        .recharge-tool {
            background: rgba(10, 10, 18, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 2.5rem;
            padding: 2rem;
            border: 1px solid rgba(0, 255, 135, 0.2);
            box-shadow: 0 0 60px rgba(0, 255, 135, 0.05);
            text-align: center;
            grid-column: 1 / -1;
        }
        .recharge-tool h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00ff87, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .recharge-tool .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin: 1.2rem 0;
        }
        .recharge-tool input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 3rem;
            padding: 0.8rem 1.5rem;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            width: 200px;
            outline: none;
            transition: 0.3s;
        }
        .recharge-tool input:focus {
            border-color: #00ff87;
            box-shadow: 0 0 30px rgba(0, 255, 135, 0.1);
        }
        .recharge-tool .quick-amounts {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
        }
        .recharge-tool .quick-amounts button {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            color: #b0b0c8;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .recharge-tool .quick-amounts button:hover {
            background: rgba(0, 255, 135, 0.15);
            border-color: #00ff87;
            color: #00ff87;
            box-shadow: 0 0 20px rgba(0, 255, 135, 0.1);
        }
        .recharge-tool .total-display {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 1.2rem 0;
            background: linear-gradient(135deg, #ff007f, #00ff87);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .recharge-tool .total-display span { font-size: 1rem; color: #8a8aa0; background: none; -webkit-background-clip: unset; background-clip: unset; }
        .btn-recharge {
            background: linear-gradient(135deg, #ff007f, #4d00ff);
            border: none;
            padding: 0.9rem 2.5rem;
            border-radius: 3rem;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.2);
            font-family: 'Cairo', sans-serif;
        }
        .btn-recharge:hover {
            transform: scale(1.05);
            box-shadow: 0 0 70px rgba(255, 0, 127, 0.4);
        }
        .recharge-fee-note {
            font-size: 0.85rem;
            color: #8a8aa0;
            margin-top: 0.8rem;
        }
        .recharge-fee-note i { color: #00ff87; }

        /* ===== مودال ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            z-index: 3000;
        }
        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #12121e;
            border-radius: 2.5rem;
            padding: 2rem;
            max-width: 500px;
            width: 92%;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8);
            text-align: center;
        }
        .modal-content h3 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00d4ff, #ff007f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .modal-content .copy-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 0.2rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #fff;
            transition: 0.3s;
        }
        .modal-content .copy-btn:hover {
            background: #00d4ff;
            color: #0a0a12;
        }
        .hidden-section { display: none; }
        .footer-note { text-align: center; font-size: 0.8rem; margin-top: 3rem; color: #5a5a70; border-top: 1px solid rgba(255,255,255,0.02); padding-top: 1.5rem; }
        .owner-name { font-size: 1rem; color: #00d4ff; font-weight: bold; letter-spacing: 1px; }
        .category-title {
            grid-column: 1 / -1;
            text-align: center;
            padding: 0.8rem;
            background: rgba(0, 212, 255, 0.03);
            border-radius: 3rem;
            border-right: 4px solid #ff007f;
            font-size: 1.4rem;
            font-weight: 800;
            color: #b0b0d0;
            letter-spacing: 1px;
        }
        .category-title i { margin-left: 0.8rem; color: #00d4ff; }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #12121e;
            border: 1px solid #00ff87;
            color: #00ff87;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            z-index: 2000;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            box-shadow: 0 0 40px rgba(0, 255, 135, 0.1);
        }
        .toast-notification.show { opacity: 1; }
    </style>
</head>
<body>

<!-- ===== شاشة الترحيب ===== -->
<div id="splashScreen">

<script>
// ===================== شاشة الترحيب =====================
(function() {
    const splash = document.getElementById('splashScreen');
    const timerEl = document.getElementById('splashTimer');
    const skipBtn = document.getElementById('skipSplash');
    let seconds = 10;
    let interval;

    function hideSplash() {
        splash.classList.add('hidden');
        clearInterval(interval);
    }

    interval = setInterval(() => {
        seconds--;
        if (seconds <= 0) { clearInterval(interval); timerEl.textContent = '0 ثواني'; hideSplash(); }
        else timerEl.textContent = seconds + ' ثواني';
    }, 1000);

    skipBtn.addEventListener('click', hideSplash);
    setTimeout(hideSplash, 10000);
})();

// ===================== البيانات =====================

// ===================== دوال العرض العامة =====================
function createCardHTML(name, price, badgeText, isVip) {
    const formattedPrice = price.toLocaleString('eg-EG');
    const vipClass = isVip ? 'vip-card' : '';
    const badgeClass = isVip ? 'vip-badge' : '';
    const badgeIcon = isVip ? '<i class="fas fa-star"></i> ' : '';
    return `
        <div class="price-card ${vipClass}">
            <div class="game-badge ${badgeClass}">${badgeIcon}${badgeText}</div>
            <div class="item-name">${name}</div>
            <div class="price-eg">${formattedPrice} <span style="font-size:0.8rem; color:#8a8aa0;">جنيه</span></div>
            <button class="btn-order" data-item="${name}" data-price="${price}"><i class="fas fa-shopping-cart"></i> اطلب الآن</button>
        </div>
    `;
}

function attachOrderEvents(container) {
    container.querySelectorAll('.btn-order').forEach(btn => {
        btn.replaceWith(btn.cloneNode(true));
    });
    container.querySelectorAll('.btn-order').forEach(btn => {
        btn.addEventListener('click', function() {
            openOrderModal(this.getAttribute('data-item'), parseFloat(this.getAttribute('data-price')));
        });
    });
}

// ===================== عرض الألعاب =====================
function renderGame(gameKey) {
    const container = document.getElementById('pricesContainer');
    let items = [], title = '';
    if (gameKey === 'pubg') { items = pubgItems; title = 'PUBG MOBILE'; }
    else if (gameKey === 'mlbb') { items = mlbbItems; title = 'Mobile Legends'; }
    else if (gameKey === 'freefire') { items = freefireItems; title = 'Free Fire'; }
    else if (gameKey === 'yallaludo') {
        let html = `<div class="category-title"><i class="fas fa-dice-d6"></i> يلا لودو - حساب</div>`;
        yallaAccountItems.forEach(i => html += createCardHTML(i.name, i.price, 'يلا لودو', false));
        html += `<div class="category-title"><i class="fas fa-id-card"></i> يلا لودو - ID</div>`;
        yallaIdItems.forEach(i => html += createCardHTML(i.name, i.price, 'يلا لودو', false));
        container.innerHTML = html; attachOrderEvents(container); return;
    }
    else if (gameKey === 'tiktok') { items = tiktokItems; title = 'TikTok Coins'; }
    else return;
    let html = `<div class="category-title"><i class="fab fa-${gameKey === 'tiktok' ? 'tiktok' : 'fa-'}"></i> ${title}</div>`;
    items.forEach(i => html += createCardHTML(i.name, i.price, title, false));
    container.innerHTML = html; attachOrderEvents(container);
}

// ===================== عرض الشحن (ميزات تفاعلية) =====================
let rechargePhone = '';
let rechargeAmount = 50;

function renderRecharge(companyKey) {
    const container = document.getElementById('rechargeContainer');
    const names = { vodafone: 'فودافون', etisalat: 'اتصالات', we: 'وي', wehome: 'WE منزلي' };
    const name = names[companyKey] || 'شحن';

    container.innerHTML = `
        <div class="recharge-tool">
            <h3><i class="fas fa-bolt" style="color:#ff007f;"></i> شحن ${name} سريع</h3>
            <p style="color:#8a8aa0; margin-bottom:0.5rem;">أدخل رقم الهاتف واختر المبلغ</p>
            <div class="input-group">
                <input type="tel" id="rechargePhoneInput" placeholder="رقم الهاتف (مثال 010...)" dir="ltr">
                <input type="number" id="rechargeAmountInput" placeholder="المبلغ بالجنيه" value="50" min="1" dir="ltr">
            </div>
            <div class="quick-amounts">
                <button onclick="setQuickAmount(10)">10 ج</button>
                <button onclick="setQuickAmount(20)">20 ج</button>
                <button onclick="setQuickAmount(50)">50 ج</button>
                <button onclick="setQuickAmount(100)">100 ج</button>
                <button onclick="setQuickAmount(200)">200 ج</button>
            </div>
            <div class="total-display" id="rechargeTotalDisplay">
                ${(50 * 0.95).toFixed(2)} <span>جنيه (بعد خصم 5%)</span>
            </div>
            <p class="recharge-fee-note"><i class="fas fa-info-circle"></i> رسوم خدمة 5% فقط، والباقي يضاف رصيدك</p>
            <button class="btn-recharge" onclick="requestRecharge('${name}')"><i class="fas fa-check-circle"></i> اطلب الشحن الآن</button>
            <p style="margin-top:0.5rem; font-size:0.8rem; color:#5a5a70;"><i class="fas fa-lock"></i> سيتم توجيهك للدفع عبر فودافون كاش</p>
        </div>
    `;

    // ربط الأحداث
    const phoneInput = document.getElementById('rechargePhoneInput');
    const amountInput = document.getElementById('rechargeAmountInput');
    if (phoneInput) phoneInput.addEventListener('input', (e) => rechargePhone = e.target.value);
    if (amountInput) {
        amountInput.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value) || 0;
            if (val < 1) val = 1;
            rechargeAmount = val;
            updateRechargeDisplay(val);
        });
        // تعيين القيمة الافتراضية
        rechargeAmount = 50;
        updateRechargeDisplay(50);
    }
}

function setQuickAmount(val) {
    rechargeAmount = val;
    const input = document.getElementById('rechargeAmountInput');
    if (input) input.value = val;
    updateRechargeDisplay(val);
}

function updateRechargeDisplay(amount) {
    const display = document.getElementById('rechargeTotalDisplay');
    if (!display) return;
    const afterFee = amount * 0.95; // 5% رسوم
    display.innerHTML = `${afterFee.toFixed(2)} <span>جنيه (بعد خصم 5%)</span>`;
}

function requestRecharge(provider) {
    const phone = document.getElementById('rechargePhoneInput')?.value.trim();
    const amount = parseFloat(document.getElementById('rechargeAmountInput')?.value) || 0;
    if (!phone || phone.length < 10) { showToast('⚠️ يرجى إدخال رقم هاتف صحيح'); return; }
    if (amount < 1) { showToast('⚠️ يرجى إدخال مبلغ صحيح'); return; }
    const afterFee = (amount * 0.95).toFixed(2);
    const itemName = `شحن ${provider} - ${phone} (${amount} ج, يصلك ${afterFee} ج)`;
    openOrderModal(itemName, amount);
}

// ===================== عرض شباب =====================
function renderShabab(currencyKey) {
    const data = shababData[currencyKey];
    if (!data) return;
    const container = document.getElementById('shababContainer');
    let html = `<div class="category-title"><i class="fas fa-coins"></i> كونات شباب - ${data.flag} ${data.currency}</div>`;
    data.items.forEach(i => html += createCardHTML(i.name, i.price, 'شباب كونات', true));
    container.innerHTML = html; attachOrderEvents(container);
}

// ===================== مودال الطلب =====================
let currentOrderItem = '';
let currentOrderPrice = 0;

function openOrderModal(item, price) {
    currentOrderItem = item;
    currentOrderPrice = price;
    const discounted = price * 0.9;
    document.getElementById('modalItemName').textContent = item;
    document.getElementById('modalPrice').textContent = price.toLocaleString('eg-EG') + ' جنيه';
    document.getElementById('modalDiscounted').textContent = discounted.toLocaleString('eg-EG') + ' جنيه';
    document.getElementById('whatsappLink').href = `https://wa.me/201044049390?text=طلب%20شحن%20${encodeURIComponent(item)}%20بمبلغ%20${price}%20جنيه`;
    document.getElementById('orderModal').classList.add('show');
}
function closeModal() { document.getElementById('orderModal').classList.remove('show'); }
function copyText(text) { navigator.clipboard.writeText(text).then(() => showToast('✅ تم نسخ: ' + text)); }
function copyAllInfo() {
    const text = `الطلب: ${currentOrderItem}\nالمبلغ: ${currentOrderPrice} جنيه\nبعد الخصم: ${(currentOrderPrice*0.9).toLocaleString('eg-EG')} جنيه\nرقم فودافون كاش: 01044049390\nالدعم: 01017954664`;
    navigator.clipboard.writeText(text).then(() => showToast('✅ تم نسخ الكل'));
}
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

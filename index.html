<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسرع من نتكم 🔥</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #05070a;
            color: #eef5ff;
            padding: 1rem;
            min-height: 100vh;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .section-switch { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 1.5rem 0; }
        .switch-btn {
            background: rgba(10,20,35,0.8);
            border: 1px solid rgba(0,255,255,0.4);
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 800;
            color: #a0b0d0;
            cursor: pointer;
            transition: 0.3s;
        }
        .switch-btn.active {
            background: linear-gradient(105deg, #0ff, #f0f);
            color: #0a0a0a;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(0,255,255,0.6);
        }
        .hidden-section { display: none; }
        .prices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 1.5rem 0;
        }
        .price-card {
            background: rgba(10,15,25,0.75);
            backdrop-filter: blur(10px);
            border-radius: 1.8rem;
            padding: 1.2rem;
            border: 1px solid rgba(0,255,255,0.3);
            transition: 0.3s;
            text-align: center;
        }
        .price-card:hover {
            transform: translateY(-5px);
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        .price-card.vip-card {
            border-color: #f0f;
            box-shadow: 0 0 12px rgba(255,0,255,0.2);
        }
        .game-badge {
            background: rgba(0,255,255,0.2);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            border: 1px solid #0ff;
        }
        .vip-badge {
            background: linear-gradient(115deg, #f0f, #0ff);
            color: #0a0a0a;
            border: none;
        }
        .item-name { font-size: 1.2rem; font-weight: 800; margin: 0.5rem 0; }
        .price-eg { font-size: 1.6rem; font-weight: 800; color: #0ff; margin: 0.5rem 0; }
        .btn-order {
            background: rgba(0,255,255,0.1);
            border: 1px solid #0ff;
            width: 100%;
            padding: 0.6rem;
            border-radius: 2rem;
            font-weight: 700;
            color: #eef5ff;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-order:hover {
            background: linear-gradient(105deg, #0ff, #f0f);
            color: #0a0a0a;
            box-shadow: 0 0 15px rgba(0,255,255,0.6);
        }
        .btn-order.loading { opacity: 0.6; pointer-events: none; }
        .tab-container { display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center; margin-bottom: 1.5rem; }
        .tab-btn {
            background: rgba(10,20,35,0.85);
            border: 1px solid rgba(0,255,255,0.3);
            padding: 0.5rem 1.4rem;
            border-radius: 60px;
            font-weight: 700;
            color: #a0b0d0;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(115deg, #0ff, #f0f);
            color: #0a0a0a;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(0,255,255,0.5);
        }
        .category-title {
            grid-column: 1 / -1;
            text-align: center;
            padding: 0.5rem;
            background: rgba(0,255,255,0.1);
            border-radius: 2rem;
            border-right: 4px solid #0ff;
            font-size: 1.3rem;
            font-weight: 800;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 3000;
        }
        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #0a0f1a;
            border-radius: 2rem;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            border: 2px solid #0ff;
            text-align: center;
        }
        .copy-btn {
            background: rgba(0,255,255,0.1);
            border: 1px solid #0ff;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #fff;
        }
        .copy-btn:hover {
            background: #0ff;
            color: #000;
        }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: #0ff;
            padding: 0.8rem 1.5rem;
            border-radius: 3rem;
            z-index: 2000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
        .toast-notification.show { opacity: 1; }
        .footer-note { text-align: center; font-size: 0.7rem; margin-top: 2rem; color: #a0b0d0; }
        .owner-name { font-size: 0.9rem; color: #0ff; font-weight: bold; }
    </style>
</head>

// ===================== دوال العرض =====================

function renderGame(gameKey) {
    const container = document.getElementById('pricesContainer');
    let items = [], title = '', icon = '';
    if (gameKey === 'pubg') { items = pubgItems; title = 'PUBG MOBILE'; icon = 'fa-playstation'; }
    else if (gameKey === 'mlbb') { items = mlbbItems; title = 'Mobile Legends'; icon = 'fa-skull-crossbones'; }
    else if (gameKey === 'freefire') { items = freefireItems; title = 'Free Fire'; icon = 'fa-fire'; }
    else if (gameKey === 'yallaludo') {
        // عرض قسمين منفصلين
        let html = `<div class="category-title"><i class="fas fa-dice-d6"></i> يلا لودو - شحن عبر الحساب</div>`;
        yallaAccountItems.forEach(item => {
            html += createCardHTML(item.name, item.price, 'يلا لودو (حساب)', 'fa-dice-d6', false);
        });
        html += `<div class="category-title"><i class="fas fa-id-card"></i> يلا لودو - شحن عبر الـ ID</div>`;
        yallaIdItems.forEach(item => {
            html += createCardHTML(item.name, item.price, 'يلا لودو (ID)', 'fa-dice-d6', false);
        });
        container.innerHTML = html;
        attachOrderEvents(container);
        return;
    }
    else if (gameKey === 'tiktok') { items = tiktokItems; title = 'TikTok Coins'; icon = 'fa-tiktok'; }
    else return;

    let html = `<div class="category-title"><i class="${icon}"></i> ${title}</div>`;
    items.forEach(item => {
        html += createCardHTML(item.name, item.price, title, icon, false);
    });
    container.innerHTML = html;
    attachOrderEvents(container);
}

function renderRecharge(companyKey) {
    const container = document.getElementById('rechargeContainer');
    const names = {
        vodafone: 'فودافون',
        etisalat: 'اتصالات',
        we: 'وي',
        wehome: 'إنترنت WE منزلي'
    };
    const name = names[companyKey] || 'شحن';
    container.innerHTML = `
        <div class="price-card" style="grid-column:1/-1; text-align:center;">
            <div class="game-badge">${name}</div>
            <div class="item-name">أسعار متغيرة 🔄</div>
            <div class="amount-desc">للحصول على أحدث الأسعار تواصل معنا عبر تلجرام</div>

function renderShabab(currencyKey) {
    const data = shababData[currencyKey];

    const container = document.getElementById('shababContainer');
    let html = `<div class="category-title"><i class="fas fa-coins"></i> كونات شباب - ${data.flag} ${data.currency}</div>`;
    data.items.forEach(item => {
        html += createCardHTML(item.name, item.price, 'شباب كونات', 'fa-crown', true);
    });
    container.innerHTML = html;
    attachOrderEvents(container);
}

// دالة مساعدة لإنشاء بطاقة سعر
function createCardHTML(name, price, badgeText, icon, isVip) {
    const formattedPrice = price.toLocaleString('eg-EG');
    const vipClass = isVip ? 'vip-card' : '';
    const badgeClass = isVip ? 'vip-badge' : '';
    const badgeIcon = isVip ? '<i class="fas fa-star"></i> ' : '';
    return `
        <div class="price-card ${vipClass}">
            <div class="game-badge ${badgeClass}">${badgeIcon}${badgeText}</div>
            <div class="item-name">${name}</div>
            <div class="price-eg">${formattedPrice} <span style="font-size:0.8rem;">جنيه</span></div>
            <button class="btn-order" data-item="${name}" data-price="${price}"><i class="fas fa-shopping-cart"></i> اطلب الآن</button>
        </div>
    `;
}

// ربط أحداث أزرار الطلب
function attachOrderEvents(container) {
    container.querySelectorAll('.btn-order').forEach(btn => {
        // إزالة المستمعات القديمة
        btn.replaceWith(btn.cloneNode(true));
    });
    container.querySelectorAll('.btn-order').forEach(btn => {
        btn.addEventListener('click', function() {
            const item = this.getAttribute('data-item');
            const price = parseFloat(this.getAttribute('data-price'));
            openOrderModal(item, price);
        });
    });
}

// ===================== مودال الطلب =====================

let currentOrderItem = '';
let currentOrderPrice = 0;

function openOrderModal(item, price) {
    currentOrderItem = item;
    currentOrderPrice = price;
    const discounted = price * 0.9;
    document.getElementById('modalItemName').textContent = item;
    document.getElementById('modalPrice').textContent = price.toLocaleString('eg-EG') + ' جنيه';
    document.getElementById('modalDiscounted').textContent = discounted.toLocaleString('eg-EG') + ' جنيه';
    document.getElementById('whatsappLink').href = `https://wa.me/201044049390?text=طلب%20شحن%20${encodeURIComponent(item)}%20بمبلغ%20${price}%20جنيه`;
    document.getElementById('orderModal').classList.add('show');
}

function closeModal() {
    document.getElementById('orderModal').classList.remove('show');
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        showToast('تم نسخ: ' + text);
    });
}

function copyAllInfo() {
    const text = `الطلب: ${currentOrderItem}\nالمبلغ: ${currentOrderPrice} جنيه\nبعد الخصم: ${(currentOrderPrice*0.9).toLocaleString('eg-EG')} جنيه\nرقم فودافون كاش: 01044049390\nالدعم: 01017954664`;
    navigator.clipboard.writeText(text).then(() => {
        showToast('تم نسخ جميع المعلومات');
    });
}

// ===================== توست =====================

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

});

// تبويبات الألعاب
document.querySelectorAll('#gameTabs .tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('#gameTabs .tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderGame(this.getAttribute('data-game'));
    });
});

// تبويبات الشحن
document.querySelectorAll('#rechargeTabs .tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('#rechargeTabs .tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderRecharge(this.getAttribute('data-recharge'));
    });
});

// تبويبات شباب
document.querySelectorAll('#shababTabs .tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('#shababTabs .tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        renderShabab(this.getAttribute('data-currency'));
    });
});

// ===================== تهيئة أولية =====================

renderGame('pubg');
renderRecharge('vodafone');
renderShabab('eg');

// إغلاق المودال عند الضغط على الخلفية
document.getElementById('orderModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
